allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  esbuild: false
  msw: false
  protobufjs: false
  sharp: false
  unrs-resolver: false

minimumReleaseAge: 2880 # 2 days in minutes

minimumReleaseAgeExclude:
  - protobufjs@7.5.5
  - playwright-core

overrides:
  postcss@<8.5.10: '>=8.5.10'
  protobufjs: ^7.5.5
  uuid@<14.0.0: '>=14.0.0'
