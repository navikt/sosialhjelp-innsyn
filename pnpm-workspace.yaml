allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  esbuild: false
  msw: false
  protobufjs: false
  sharp: false
  unrs-resolver: false

trustLockfile: true # GitHub Packages tarball URLs change format; treat committed lockfile as trusted

minimumReleaseAge: 2880 # 2 days in minutes

minimumReleaseAgeExclude:
  - protobufjs@7.5.5
  - '@navikt/next-api-proxy@5.0.5'

overrides:
  postcss@<8.5.10: '>=8.5.10'
  protobufjs: ^7.5.5
  uuid@<14.0.0: '>=14.0.0'
